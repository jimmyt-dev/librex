services:
  postgres:
    image: postgres:16-alpine
    container_name: reliquary-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: reliquary
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: reliquary
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reliquary"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    container_name: reliquary
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://reliquary:${POSTGRES_PASSWORD}@postgres:5432/reliquary
      ORIGIN: ${ORIGIN}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      # API runs internally on port 5321 inside the same container
      API_URL: http://localhost:5321
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ${BOOKS_PATH:-./books}:/books
      - ${BOOKDROP_PATH:-./bookdrop}:/bookdrop
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

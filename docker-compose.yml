services:
  postgres:
    container_name: reliquary_dev_postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reliquary
      POSTGRES_PASSWORD: reliquary
      POSTGRES_DB: reliquary
    ports:
      - "5434:5432"
    volumes:
      - reliquary_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reliquary"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  reliquary_dev_data:

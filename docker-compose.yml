services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reliquary
      POSTGRES_PASSWORD: reliquary
      POSTGRES_DB: reliquary
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reliquary"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

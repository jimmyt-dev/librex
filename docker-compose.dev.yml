services:
  postgres:
    container_name: librex_dev_postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-librex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-librex}
      POSTGRES_DB: ${POSTGRES_DB:-librex}
    ports:
      - "5434:5432"
    volumes:
      - librex_dev_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-librex} -d ${POSTGRES_DB:-librex}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  librex_dev_postgres_data:
